<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rickroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隐藏滚动条 */
        }
        /* 全屏视频容器 */
        .video-wrap {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* 放在页面底层 */
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 铺满屏幕，裁剪多余部分无黑边 */
        }
        /* 音量控制按钮 */
        .volume-btn {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .volume-btn:hover {
            background: rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>
    <!-- 全屏视频 -->
    <div class="video-wrap">
        <video id="bgVideo" autoplay loop  volume="1">
            <!-- 替换成你的视频地址，支持mp4/webm -->
            <source src="http://github.com/Ruyue713/embedded-webview-rickroll/releases/download/default/rickroll.mp4" type="video/mp4">
        </video>
    </div>
  
</body>
</html>
